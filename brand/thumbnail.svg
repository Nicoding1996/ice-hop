<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ice Hop: penguins heading into the water at dawn">
  <!--
    Ice Hop Devpost thumbnail / key art. 1200x800 = 3:2 (Devpost's recommended
    ratio). Export a PNG at 1200x800 (or 2x = 2400x1600) with brand/thumbnail.html.
    Reuses the exact in-game characters (theme.ts / banner.svg): the outlined
    chunky penguin (HOPPER), the lounging seal (SLIDER - a 1x2 piece, so it is
    drawn LARGER than a penguin to match the board), and the water hole (GOAL)
    with a bobbing penguin. Palette = src/client/art/theme.ts (Arctic at Dawn).
    No blur filters, so it rasterizes identically across exporters; the wordmark
    shadow is an offset duplicate (solid fills export reliably).
  -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#091a33"/>
      <stop offset="0.58" stop-color="#143a5c"/>
      <stop offset="1" stop-color="#1c4a6e"/>
    </linearGradient>
    <linearGradient id="ice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef9ff"/>
      <stop offset="1" stop-color="#bfe3f2"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.08" r="0.8">
      <stop offset="0" stop-color="#ff8a5b" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#ff8a5b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#06151f" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#06151f" stop-opacity="0"/>
    </radialGradient>
    <!-- The in-game penguin (outlined, chunky), normalized to a ~100x120 box. -->
    <g id="peng">
      <ellipse cx="33" cy="114" rx="15" ry="8.5" fill="#f6a623" stroke="#c77f15" stroke-width="2.5" transform="rotate(-12.6 33 114)"/>
      <ellipse cx="67" cy="114" rx="15" ry="8.5" fill="#f6a623" stroke="#c77f15" stroke-width="2.5" transform="rotate(12.6 67 114)"/>
      <ellipse cx="12" cy="79" rx="10" ry="26" fill="#2b3440" stroke="#141a22" stroke-width="4" transform="rotate(9.2 12 79)"/>
      <ellipse cx="88" cy="79" rx="10" ry="26" fill="#2b3440" stroke="#141a22" stroke-width="4" transform="rotate(-9.2 88 79)"/>
      <ellipse cx="50" cy="73" rx="42" ry="45" fill="#2b3440" stroke="#141a22" stroke-width="4"/>
      <ellipse cx="50" cy="95" rx="27" ry="29" fill="#f4f9fc"/>
      <ellipse cx="35" cy="58" rx="11" ry="13" fill="#ffffff"/>
      <ellipse cx="65" cy="58" rx="11" ry="13" fill="#ffffff"/>
      <circle cx="37" cy="60" r="7" fill="#15202b"/>
      <circle cx="63" cy="60" r="7" fill="#15202b"/>
      <circle cx="40" cy="56" r="2.5" fill="#ffffff"/>
      <circle cx="66" cy="56" r="2.5" fill="#ffffff"/>
      <polygon points="44,68 56,68 50,77" fill="#f6a623" stroke="#c77f15" stroke-width="2" stroke-linejoin="round"/>
    </g>
  </defs>

  <!-- sky + sunrise glow -->
  <rect width="1200" height="800" fill="url(#sky)"/>
  <ellipse cx="600" cy="0" rx="820" ry="320" fill="url(#sun)"/>

  <!-- stars -->
  <g fill="#dff1fb">
    <circle cx="140" cy="70" r="2.4" opacity="0.7"/>
    <circle cx="300" cy="52" r="1.6" opacity="0.5"/>
    <circle cx="520" cy="46" r="2" opacity="0.6"/>
    <circle cx="760" cy="64" r="1.5" opacity="0.45"/>
    <circle cx="980" cy="50" r="2.2" opacity="0.7"/>
    <circle cx="1070" cy="96" r="1.6" opacity="0.5"/>
    <circle cx="1150" cy="60" r="2" opacity="0.6"/>
    <circle cx="210" cy="150" r="1.5" opacity="0.4"/>
  </g>

  <!-- aurora (soft smooth bands, no blur so it exports cleanly) -->
  <path d="M-40 118 Q 300 80 620 116 T 1240 120" stroke="#7fe0ff" stroke-width="22" fill="none" opacity="0.10" stroke-linecap="round"/>
  <path d="M-40 150 Q 360 112 680 150 T 1240 156" stroke="#9af0d4" stroke-width="16" fill="none" opacity="0.07" stroke-linecap="round"/>

  <!-- distant snowy peaks, behind the ice line -->
  <path d="M0 472 L160 430 L300 462 L460 424 L620 460 L780 430 L940 466 L1100 428 L1200 458 L1200 508 L0 508 Z" fill="#21496e" opacity="0.85"/>
  <g fill="#cfe6f2" opacity="0.5">
    <path d="M460 424 L486 452 L434 452 Z"/>
    <path d="M780 430 L806 456 L754 456 Z"/>
    <path d="M1100 428 L1126 454 L1074 454 Z"/>
  </g>

  <!-- ice sheet (back drift + front sheet with highlight), continues to bottom -->
  <path d="M-20 500 C 300 488, 700 496, 1220 492 L1220 800 L-20 800 Z" fill="#cfe8f4"/>
  <path d="M-20 526 C 350 514, 820 530, 1220 522 L1220 800 L-20 800 Z" fill="url(#ice)"/>
  <path d="M-20 526 C 350 514, 820 530, 1220 522" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.6"/>

  <!-- wordmark backdrop for legibility -->
  <ellipse cx="600" cy="222" rx="540" ry="165" fill="url(#vig)"/>

  <!-- ground scene: the seal, the colony, and the water hole. Nudged down as one
       group so the cast sits lower and fills the foreground. -->
  <g transform="translate(0 42)">
    <!-- seal lounging on the ice, lower left. It is a 1x2 SLIDER, so it is the
         biggest creature on the board - scaled up to read that way. -->
    <g transform="translate(-120 167) scale(1.4)">
      <ellipse cx="154" cy="287" rx="17" ry="10" fill="#7d8c9b" stroke="#3a4654" stroke-width="3" transform="rotate(31.5 154 287)"/>
      <ellipse cx="154" cy="313" rx="17" ry="10" fill="#7d8c9b" stroke="#3a4654" stroke-width="3" transform="rotate(-31.5 154 313)"/>
      <ellipse cx="218" cy="300" rx="70" ry="31" fill="#7d8c9b" stroke="#3a4654" stroke-width="4"/>
      <ellipse cx="218" cy="312" rx="50" ry="16" fill="#b9c6d2"/>
      <ellipse cx="232" cy="324" rx="17" ry="8" fill="#7d8c9b" stroke="#3a4654" stroke-width="3" transform="rotate(17.2 232 324)"/>
      <ellipse cx="280" cy="284" rx="31" ry="28" fill="#7d8c9b" stroke="#3a4654" stroke-width="4"/>
      <ellipse cx="298" cy="294" rx="13" ry="10" fill="#b9c6d2"/>
      <circle cx="308" cy="292" r="5" fill="#2a333d"/>
      <circle cx="274" cy="274" r="5.5" fill="#15202b"/>
      <circle cx="292" cy="274" r="5.5" fill="#15202b"/>
      <circle cx="276" cy="272" r="2" fill="#ffffff"/>
      <circle cx="294" cy="272" r="2" fill="#ffffff"/>
      <line x1="309" y1="290" x2="330" y2="286" stroke="#aebecb" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="310" y1="293" x2="332" y2="293" stroke="#aebecb" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="309" y1="296" x2="330" y2="300" stroke="#aebecb" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- the colony heading for the water -->
    <use href="#peng" transform="translate(370 472) scale(1.15)"/>
    <use href="#peng" transform="translate(715 468) scale(1.2)"/>
    <use href="#peng" transform="translate(525 429) scale(1.5)"/>

    <!-- water hole with a bobbing penguin (the "solved" beat) -->
    <g>
      <ellipse cx="1010" cy="588" rx="98" ry="31" fill="#9ccfe2"/>
      <ellipse cx="1010" cy="590" rx="84" ry="26" fill="#0e3a55"/>
      <ellipse cx="970" cy="560" rx="9" ry="20" fill="#2b3440" stroke="#141a22" stroke-width="3" transform="rotate(28 970 560)"/>
      <ellipse cx="1050" cy="560" rx="9" ry="20" fill="#2b3440" stroke="#141a22" stroke-width="3" transform="rotate(-28 1050 560)"/>
      <ellipse cx="1010" cy="560" rx="40" ry="42" fill="#2b3440" stroke="#141a22" stroke-width="3.5"/>
      <ellipse cx="1010" cy="576" rx="18" ry="17" fill="#f4f9fc"/>
      <ellipse cx="997" cy="542" rx="11" ry="12" fill="#ffffff"/>
      <ellipse cx="1023" cy="542" rx="11" ry="12" fill="#ffffff"/>
      <circle cx="1000" cy="544" r="6" fill="#15202b"/>
      <circle cx="1020" cy="544" r="6" fill="#15202b"/>
      <circle cx="997" cy="540" r="2.2" fill="#ffffff"/>
      <circle cx="1023" cy="540" r="2.2" fill="#ffffff"/>
      <polygon points="1001,553 1019,553 1010,567" fill="#f6a623" stroke="#c77f15" stroke-width="2" stroke-linejoin="round"/>
      <ellipse cx="1010" cy="592" rx="84" ry="20" fill="#0e3a55"/>
    </g>
  </g>

  <!-- wordmark + tagline (centered) -->
  <g text-anchor="middle" font-family="'Trebuchet MS','Segoe UI',Verdana,sans-serif">
    <text x="600" y="256" font-size="150" font-weight="800" letter-spacing="6" fill="#06151f" opacity="0.45">ICE HOP</text>
    <text x="600" y="250" font-size="150" font-weight="800" letter-spacing="6" fill="#ffffff">ICE HOP</text>
    <text x="600" y="320" font-size="40" font-weight="600" letter-spacing="1.5" fill="#cfe8f4">Get every penguin into the water!</text>
  </g>
</svg>
