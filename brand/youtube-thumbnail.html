<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Ice Hop - YouTube thumbnail</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    gap: 16px; justify-content: center; padding: 24px; background: #0b1f3a; color: #eaf6fb;
    font-family: 'Trebuchet MS', 'Segoe UI', Verdana, sans-serif; }
  h1 { font-size: 18px; font-weight: 700; margin: 0; }
  p { margin: 0; opacity: 0.8; font-size: 13px; text-align: center; max-width: 640px; }
  #preview { width: min(92vw, 760px); aspect-ratio: 16 / 9; border-radius: 12px;
    box-shadow: 0 12px 44px rgba(0,0,0,0.5); overflow: hidden; background: #091a33; }
  #preview svg { width: 100%; height: 100%; display: block; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  button { font: inherit; font-weight: 700; cursor: pointer; border: 0; border-radius: 999px;
    padding: 12px 22px; color: #062033; background: #ff8a5b; }
  button.alt { background: #ffd166; }
  button:active { transform: translateY(1px); }
</style>
</head>
<body>
  <h1>Ice Hop YouTube thumbnail</h1>
  <div id="preview"></div>
  <div class="row">
    <button id="dl1">Download PNG (1280 x 720)</button>
    <button id="dl2" class="alt">Download PNG (2560 x 1440)</button>
  </div>
  <p>1280 x 720 is YouTube's standard size (16:9, under 2&nbsp;MB). Upload it as your video's custom thumbnail.</p>

    <text x="640" y="221" font-size="164" font-weight="800" letter-spacing="7" fill="#06151f" opacity="0.45">ICE HOP</text>
    <text x="640" y="214" font-size="164" font-weight="800" letter-spacing="7" fill="#ffffff">ICE HOP</text>
    <text x="640" y="292" font-size="46" font-weight="700" letter-spacing="1.5" fill="#ffd166">Get every penguin into the water!</text>
  </g>
</svg>`;

document.getElementById('preview').innerHTML = SVG;

function download(scale) {
  const W = 1280 * scale, H = 720 * scale;
  const blob = new Blob([SVG], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function () {
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    canvas.getContext('2d').drawImage(img, 0, 0, W, H);
    URL.revokeObjectURL(url);
    const finish = (outUrl, revoke) => {
      const a = document.createElement('a');
      a.href = outUrl; a.download = 'ice-hop-youtube-' + W + 'x' + H + '.png';
      document.body.appendChild(a); a.click(); a.remove();
      if (revoke) setTimeout(() => URL.revokeObjectURL(outUrl), 1000);
    };
    if (canvas.toBlob) canvas.toBlob((b) => finish(URL.createObjectURL(b), true), 'image/png');
    else finish(canvas.toDataURL('image/png'), false);
  };
  img.onerror = function () { alert('Could not render the SVG.'); URL.revokeObjectURL(url); };
  img.src = url;
}
document.getElementById('dl1').addEventListener('click', () => download(1));
document.getElementById('dl2').addEventListener('click', () => download(2));
</script>
</body>
</html>
