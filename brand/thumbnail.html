<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Ice Hop - thumbnail exporter</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; gap: 18px; justify-content: center;
    background: #0b1f3a; color: #eaf6fb;
    font-family: 'Trebuchet MS', 'Segoe UI', Verdana, sans-serif;
    padding: 24px;
  }
  h1 { font-size: 18px; font-weight: 700; margin: 0; }
  p { margin: 0; opacity: 0.8; font-size: 13px; text-align: center; max-width: 640px; }
  #preview { width: min(90vw, 600px); aspect-ratio: 3 / 2; border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5); overflow: hidden; background: #091a33; }
  #preview svg { width: 100%; height: 100%; display: block; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  button {
    font: inherit; font-weight: 700; cursor: pointer; border: 0; border-radius: 999px;
    padding: 12px 22px; color: #062033; background: #ff8a5b;
  }
  button.alt { background: #ffd166; }
  button:active { transform: translateY(1px); }
</style>
</head>
<body>
  <h1>Ice Hop thumbnail</h1>
  <div id="preview"><!-- SVG injected here --></div>
  <div class="row">
    <button id="dl1">Download PNG (1200 x 800)</button>
    <button id="dl2" class="alt">Download PNG (2400 x 1600, crisper)</button>
  </div>
  <p>Both are 3:2 and well under Devpost's 5&nbsp;MB limit. Upload either one as your project thumbnail.</p>

document.getElementById('preview').innerHTML = SVG;

function download(scale) {
  const W = 1200 * scale, H = 800 * scale;
  const blob = new Blob([SVG], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function () {
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, W, H);
    URL.revokeObjectURL(url);
    const finish = (outUrl, revoke) => {
      const a = document.createElement('a');
      a.href = outUrl;
      a.download = 'ice-hop-thumbnail-' + W + 'x' + H + '.png';
      document.body.appendChild(a); a.click(); a.remove();
      if (revoke) setTimeout(() => URL.revokeObjectURL(outUrl), 1000);
    };
    if (canvas.toBlob) {
      canvas.toBlob((b) => finish(URL.createObjectURL(b), true), 'image/png');
    } else {
      finish(canvas.toDataURL('image/png'), false);
    }
  };
  img.onerror = function () { alert('Could not render the SVG in this browser.'); URL.revokeObjectURL(url); };
  img.src = url;
}

document.getElementById('dl1').addEventListener('click', () => download(1));
document.getElementById('dl2').addEventListener('click', () => download(2));
